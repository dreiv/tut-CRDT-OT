name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./public"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
